<style>
.quick-chat{position:fixed;right:34px;bottom:30px;width:390px;height:560px;border-radius:24px;background:#f6f6f6;border:1px solid #d4dbe5;box-shadow:0 16px 32px rgba(0,0,0,.18);display:none;flex-direction:column;overflow:hidden;z-index:21}
.quick-chat.open{display:flex}
.quick-chat-header{height:68px;padding:0 14px;border-bottom:1px solid #d8dee8;display:grid;grid-template-columns:30px 42px 1fr 24px 24px;gap:8px;align-items:center}
.quick-chat-head-link,.quick-chat-head-btn{border:none;background:transparent;text-decoration:none;color:#12151a;font-size:28px;line-height:1;cursor:pointer}
.quick-chat-head-btn{font-size:34px;padding:0}
.quick-chat-avatar{width:40px;height:40px;border-radius:50%;object-fit:cover;background:#d7dce4}
.quick-chat-name{font-size:22px;line-height:28px;font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.quick-chat-body{flex:1;overflow:auto;padding:14px}
.quick-bubble{width:fit-content;max-width:82%;border-radius:16px;background:#eef2f7;padding:10px 12px 8px;margin-bottom:10px}
.quick-bubble.mine{margin-left:auto;background:#cfe4fb}
.quick-bubble-media,.quick-bubble-video{max-width:220px;border-radius:10px;display:block;margin-bottom:8px}
.quick-bubble-text{font-family:'Montserrat',sans-serif;font-size:14px;line-height:20px;font-weight:400;color:#1f232b;white-space:pre-wrap}
.quick-bubble-meta{margin-top:4px;display:flex;justify-content:flex-end;align-items:center;gap:4px}
.quick-bubble-time{font-size:12px;line-height:14px;color:#4f5968}
.quick-bubble-ticks{width:14px;height:14px;object-fit:contain}
.quick-chat-empty{color:#4f5968;text-align:center;font-size:16px;line-height:24px;padding-top:24px}
.quick-chat-composer{border-top:1px solid #d8dee8;padding:10px;background:#f6f6f6;position:relative}
.quick-chat-form{border:1px solid #cbd3df;border-radius:24px;background:#fff;display:grid;grid-template-columns:24px 1fr 24px 24px;gap:8px;align-items:center;padding:8px 12px}
.quick-chat-icon{width:20px;height:20px;opacity:.9;object-fit:contain}
.quick-chat-input{font-family:'Montserrat',sans-serif;border:none;outline:none;background:transparent;font-size:14px;line-height:20px;font-weight:400}
.quick-chat-submit,.quick-chat-emoji-btn{border:none;background:transparent;cursor:pointer;padding:0;display:flex;align-items:center;justify-content:center}
.quick-chat-file{display:none}
.quick-chat-emoji-picker{position:absolute;right:10px;bottom:62px;width:210px;background:#fff;border:1px solid #d8dee8;border-radius:12px;box-shadow:0 10px 24px rgba(0,0,0,.14);display:none;padding:8px;z-index:4}
.quick-chat-emoji-picker.open{display:block}
.quick-chat-emoji-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:4px}
.quick-chat-emoji-item{border:none;background:transparent;font-size:18px;line-height:1;padding:5px 0;cursor:pointer;border-radius:8px}
.quick-chat-emoji-item:hover{background:#edf3fb}
#quickChatFab{width:330px;max-width:calc(100vw - 68px);justify-content:flex-start;padding:14px 16px;gap:10px;border-radius:22px;box-shadow:0 10px 20px rgba(0,0,0,.14);border:none;background:#f7f8fa}
#quickChatFab .chat-fab-text{font-size:16px;line-height:20px;font-weight:400;font-family:'Montserrat',sans-serif}
#quickChatFab:focus,
#quickChatFab:focus-visible{outline:none}
.chat-fab-avatars{margin-left:auto;display:flex;align-items:center}
.chat-fab-avatar{width:32px;height:32px;border-radius:50%;object-fit:cover;border:2px solid #f7f8fa;background:#d7dce4}
.chat-fab-avatar + .chat-fab-avatar{margin-left:-12px}
@media (max-width:920px){
  .quick-chat{left:12px;right:12px;width:auto;bottom:12px;height:500px}
  #quickChatFab{width:auto;max-width:none;padding:12px 14px;border-radius:18px}
  #quickChatFab .chat-fab-text{font-size:16px;line-height:20px}
  .chat-fab-avatar{width:28px;height:28px}
}
</style>

<button type="button" class="chat-fab" id="quickChatFab" aria-label="&#1055;&#1086;&#1074;&#1110;&#1076;&#1086;&#1084;&#1083;&#1077;&#1085;&#1085;&#1103;">
  <img class="chat-fab-icon" src="/images/icons/ph_paper-plane-tilt-light.svg" alt="">
  <span class="chat-fab-text">&#1055;&#1086;&#1074;&#1110;&#1076;&#1086;&#1084;&#1083;&#1077;&#1085;&#1085;&#1103;</span>
  <span class="chat-fab-avatars" aria-hidden="true">
    <img class="chat-fab-avatar" src="{% if latest_chat and latest_chat.partner.photo_url %}{{ latest_chat.partner.photo_url }}{% else %}/images/no-image.png{% endif %}" alt="">
    <img class="chat-fab-avatar" src="{% if current_user and current_user.photo_url %}{{ current_user.photo_url }}{% else %}/images/no-image.png{% endif %}" alt="">
  </span>
</button>

<aside class="quick-chat" id="quickChatPanel" aria-hidden="true">
  <header class="quick-chat-header">
    <a class="quick-chat-head-link" id="quickChatBack" href="/messages/" aria-label="&#1042;&#1110;&#1076;&#1082;&#1088;&#1080;&#1090;&#1080; &#1095;&#1072;&#1090;">&lsaquo;</a>
    <img class="quick-chat-avatar" id="quickChatAvatar" src="/images/no-image.png" alt="">
    <div class="quick-chat-name" id="quickChatName">&#1063;&#1072;&#1090;</div>
    <a class="quick-chat-head-link" id="quickChatExpand" href="/messages/" aria-label="&#1055;&#1086;&#1074;&#1085;&#1080;&#1081; &#1095;&#1072;&#1090;">&#x2922;</a>
    <button type="button" class="quick-chat-head-btn" id="quickChatClose" aria-label="&#1047;&#1072;&#1082;&#1088;&#1080;&#1090;&#1080;">&times;</button>
  </header>

  <div class="quick-chat-body" id="quickChatBody">
    <div class="quick-chat-empty">&#1047;&#1072;&#1074;&#1072;&#1085;&#1090;&#1072;&#1078;&#1077;&#1085;&#1085;&#1103;...</div>
  </div>

  <div class="quick-chat-composer">
    <form class="quick-chat-form" id="quickChatForm">
      <label for="quickChatFile" style="cursor:pointer;display:flex;align-items:center;">
        <img class="quick-chat-icon" src="/images/icons/mynaui_paperclip.svg" alt="&#1060;&#1072;&#1081;&#1083;">
      </label>
      <input class="quick-chat-file" id="quickChatFile" type="file" accept="image/*,video/*">
      <input class="quick-chat-input" id="quickChatInput" type="text" placeholder="&#1053;&#1072;&#1087;&#1080;&#1089;&#1072;&#1090;&#1080; &#1087;&#1086;&#1074;&#1110;&#1076;&#1086;&#1084;&#1083;&#1077;&#1085;&#1085;&#1103;...">
      <button type="button" class="quick-chat-emoji-btn" id="quickChatEmojiToggle" aria-label="&#1057;&#1084;&#1072;&#1081;&#1083;&#1080;">
        <img class="quick-chat-icon" src="/images/icons/iconoir_emoji.svg" alt="">
      </button>
      <button type="submit" class="quick-chat-submit" aria-label="&#1042;&#1110;&#1076;&#1087;&#1088;&#1072;&#1074;&#1080;&#1090;&#1080;">
        <img class="quick-chat-icon" src="/images/icons/iconamoon_microphone-thin.svg" alt="">
      </button>
    </form>
    <div class="quick-chat-emoji-picker" id="quickChatEmojiPicker" aria-hidden="true">
      <div class="quick-chat-emoji-grid">
        <button type="button" class="quick-chat-emoji-item">&#128512;</button><button type="button" class="quick-chat-emoji-item">&#128513;</button><button type="button" class="quick-chat-emoji-item">&#128514;</button><button type="button" class="quick-chat-emoji-item">&#128521;</button><button type="button" class="quick-chat-emoji-item">&#128525;</button><button type="button" class="quick-chat-emoji-item">&#128536;</button><button type="button" class="quick-chat-emoji-item">&#128526;</button>
        <button type="button" class="quick-chat-emoji-item">&#129303;</button><button type="button" class="quick-chat-emoji-item">&#129300;</button><button type="button" class="quick-chat-emoji-item">&#128588;</button><button type="button" class="quick-chat-emoji-item">&#128077;</button><button type="button" class="quick-chat-emoji-item">&#128293;</button><button type="button" class="quick-chat-emoji-item">&#10024;</button><button type="button" class="quick-chat-emoji-item">&#127881;</button>
        <button type="button" class="quick-chat-emoji-item">&#10084;&#65039;</button><button type="button" class="quick-chat-emoji-item">&#128153;</button><button type="button" class="quick-chat-emoji-item">&#128154;</button><button type="button" class="quick-chat-emoji-item">&#128155;</button><button type="button" class="quick-chat-emoji-item">&#128156;</button><button type="button" class="quick-chat-emoji-item">&#128591;</button><button type="button" class="quick-chat-emoji-item">&#129309;</button>
      </div>
    </div>
  </div>
</aside>

<script>
(function(){
  const fab = document.getElementById("quickChatFab");
  const panel = document.getElementById("quickChatPanel");
  const closeBtn = document.getElementById("quickChatClose");
  const body = document.getElementById("quickChatBody");
  const nameEl = document.getElementById("quickChatName");
  const avatarEl = document.getElementById("quickChatAvatar");
  const backLink = document.getElementById("quickChatBack");
  const expandLink = document.getElementById("quickChatExpand");
  const form = document.getElementById("quickChatForm");
  const input = document.getElementById("quickChatInput");
  const fileInput = document.getElementById("quickChatFile");
  const emojiToggle = document.getElementById("quickChatEmojiToggle");
  const emojiPicker = document.getElementById("quickChatEmojiPicker");
  const emojiItems = document.querySelectorAll(".quick-chat-emoji-item");
  let poller = null;

  function getCookie(name){
    let value = null;
    if(document.cookie && document.cookie !== ""){
      const cookies = document.cookie.split(";");
      for(let i = 0; i < cookies.length; i++){
        const cookie = cookies[i].trim();
        if(cookie.substring(0, name.length + 1) === (name + "=")){
          value = decodeURIComponent(cookie.substring(name.length + 1));
          break;
        }
      }
    }
    return value;
  }

  function escapeHtml(str){
    return String(str || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\"/g,"&quot;").replace(/'/g,"&#039;");
  }

  function renderMessages(messages){
    if(!messages || !messages.length){
      body.innerHTML = '<div class="quick-chat-empty">\u041f\u043e\u043a\u0438 \u043d\u0435\u043c\u0430\u0454 \u043f\u043e\u0432\u0456\u0434\u043e\u043c\u043b\u0435\u043d\u044c</div>';
      return;
    }
    body.innerHTML = messages.map((msg) => {
      const mediaImage = msg.image_url ? `<img class="quick-bubble-media" src="${escapeHtml(msg.image_url)}" alt="">` : "";
      const mediaVideo = msg.video_url ? `<video class="quick-bubble-video" src="${escapeHtml(msg.video_url)}" controls preload="metadata"></video>` : "";
      const text = msg.text ? `<div class="quick-bubble-text">${escapeHtml(msg.text)}</div>` : "";
      const ticks = msg.is_mine ? '<img class="quick-bubble-ticks" src="/images/icons/mdi_ticks.svg" alt="sent">' : "";
      return `<div class="quick-bubble ${msg.is_mine ? "mine" : ""}">${mediaImage}${mediaVideo}${text}<div class="quick-bubble-meta"><span class="quick-bubble-time">${escapeHtml(msg.time || "")}</span>${ticks}</div></div>`;
    }).join("");
    body.scrollTop = body.scrollHeight;
  }

  function applyChatData(data){
    if(!data || !data.exists){
      nameEl.textContent = "\u0427\u0430\u0442";
      avatarEl.src = "/images/no-image.png";
      backLink.href = "/messages/";
      expandLink.href = "/messages/";
      input.disabled = true;
      fileInput.disabled = true;
      body.innerHTML = '<div class="quick-chat-empty">\u041d\u0435\u043c\u0430\u0454 \u0430\u043a\u0442\u0438\u0432\u043d\u043e\u0433\u043e \u0447\u0430\u0442\u0443</div>';
      return;
    }
    nameEl.textContent = data.partner.name || "\u0427\u0430\u0442";
    avatarEl.src = data.partner.photo_url || "/images/no-image.png";
    backLink.href = data.chat_url || "/messages/";
    expandLink.href = data.chat_url || "/messages/";
    input.disabled = false;
    fileInput.disabled = false;
    renderMessages(data.messages || []);
  }

  async function loadChat(){
    const resp = await fetch("/api/latest-chat/", {credentials:"same-origin"});
    if(!resp.ok){ applyChatData(null); return; }
    applyChatData(await resp.json());
  }

  async function sendChatMessage(){
    const text = input.value.trim();
    const file = fileInput.files && fileInput.files[0] ? fileInput.files[0] : null;
    if(!text && !file){ return; }
    const formData = new FormData();
    if(text){ formData.append("text", text); }
    if(file){
      if(file.type && file.type.startsWith("video/")){ formData.append("video", file); }
      else { formData.append("image", file); }
    }
    const resp = await fetch("/api/latest-chat/send/", {method:"POST",credentials:"same-origin",headers:{"X-CSRFToken": getCookie("csrftoken")},body:formData});
    if(!resp.ok){ return; }
    input.value = "";
    fileInput.value = "";
    applyChatData(await resp.json());
  }

  function openPanel(){
    panel.classList.add("open");
    panel.setAttribute("aria-hidden", "false");
    fab.style.display = "none";
    loadChat();
    if(!poller){ poller = setInterval(loadChat, 5000); }
  }

  function closePanel(){
    panel.classList.remove("open");
    panel.setAttribute("aria-hidden", "true");
    fab.style.display = "";
    if(emojiPicker){ emojiPicker.classList.remove("open"); emojiPicker.setAttribute("aria-hidden", "true"); }
    if(poller){ clearInterval(poller); poller = null; }
  }

  fab.addEventListener("click", function(event){
    event.preventDefault();
    if(panel.classList.contains("open")){ closePanel(); } else { openPanel(); }
  });
  closeBtn.addEventListener("click", closePanel);

  document.addEventListener("click", function(event){
    if(emojiPicker && emojiPicker.classList.contains("open")){
      if(!emojiPicker.contains(event.target) && !emojiToggle.contains(event.target)){
        emojiPicker.classList.remove("open");
        emojiPicker.setAttribute("aria-hidden", "true");
      }
    }
    if(!panel.classList.contains("open")){ return; }
    if(panel.contains(event.target) || fab.contains(event.target)){ return; }
    closePanel();
  });

  document.addEventListener("keydown", function(event){
    if(event.key === "Escape"){ closePanel(); }
    if(event.key === "Enter" && panel.classList.contains("open") && document.activeElement === input){
      event.preventDefault();
      sendChatMessage();
    }
  });

  form.addEventListener("submit", function(event){ event.preventDefault(); sendChatMessage(); });
  fileInput.addEventListener("change", function(){ if(fileInput.files && fileInput.files.length){ sendChatMessage(); } });

  if(emojiToggle && emojiPicker){
    emojiToggle.addEventListener("click", function(event){
      event.stopPropagation();
      const opened = emojiPicker.classList.toggle("open");
      emojiPicker.setAttribute("aria-hidden", opened ? "false" : "true");
    });
    emojiItems.forEach(function(item){
      item.addEventListener("click", function(){
        const emoji = item.textContent || "";
        const start = input.selectionStart || input.value.length;
        const end = input.selectionEnd || input.value.length;
        input.value = input.value.slice(0, start) + emoji + input.value.slice(end);
        const next = start + emoji.length;
        input.focus();
        input.setSelectionRange(next, next);
      });
    });
  }
})();
</script>
